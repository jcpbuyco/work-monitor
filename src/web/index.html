<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>agent-monitor</title>
    <script>
      (function () {
        try {
          var t = localStorage.getItem('am-theme');
          if (t !== 'light' && t !== 'dark') {
            t = (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches)
              ? 'light'
              : 'dark';
          }
          if (t === 'dark') document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
    <script>
      (function () {
        try {
          var s = Number(localStorage.getItem('am-text-size'));
          if ([14, 16, 18, 20, 22].indexOf(s) !== -1) document.documentElement.style.fontSize = s + 'px';
        } catch (e) {}
      })();
    </script>
    <script>
      (function () {
        // Motion is ON by default for this dashboard; only off when explicitly disabled.
        try {
          if (localStorage.getItem('am-motion') !== 'off') document.documentElement.classList.add('am-anim');
        } catch (e) {
          document.documentElement.classList.add('am-anim');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
